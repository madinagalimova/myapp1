<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заявки | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Главная</a>
            <a class="nav-link active" href="/tickets">Заявки</a>
            <a class="nav-link" href="/about">О нас</a>
            <a class="nav-link" href="/contacts">Контакты</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="mb-4">Список заявок</h1>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr><th>ID</th><th>Тема</th><th>Пользователь</th><th>Статус</th><th>Дата создания</th></tr>
                </thead>
                <tbody>
                <tr th:each="ticket : ${tickets}">
                    <td th:text="${ticket.id}">1</td>
                    <td><strong th:text="${ticket.title}">Тема</strong>
                        <small class="text-muted" th:text="${ticket.description}">Описание</small></td>
                    <td th:text="${ticket.customerName}">Имя</td>
                    <td><span class="badge bg-secondary" th:text="${ticket.status}">NEW</span></td>
                    <td th:text="${ticket.createdAt}">2026-05-14</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
