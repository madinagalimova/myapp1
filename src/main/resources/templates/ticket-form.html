<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать заявку | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/tickets}">Заявки</a>
            <a class="nav-link active" th:href="@{/tickets/new}">Создать заявку</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="mb-3">Создание заявки</h1>
                    <p class="text-muted mb-4">Опишите проблему, и специалист поддержки свяжется с вами.</p>

                    <form th:action="@{/tickets}" th:object="${ticket}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Ваше имя</label>
                            <input type="text" class="form-control" th:field="*{customerName}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{customerName}">Ошибка</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Тема заявки</label>
                            <input type="text" class="form-control" th:field="*{title}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{title}">Ошибка</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Описание проблемы</label>
                            <textarea rows="6" class="form-control" th:field="*{description}" th:errorclass="is-invalid"></textarea>
                            <div class="invalid-feedback" th:errors="*{description}">Ошибка</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Отправить заявку</button>
                            <a th:href="@{/tickets}" class="btn btn-outline-secondary">Назад к списку</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
